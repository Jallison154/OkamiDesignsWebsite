<!DOCTYPE html>
<html lang="en" class="signal-lab-output-root">
<head>
    <!-- Signal Lab asset build: 20260615 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okami Signal Lab — Output</title>
    <link rel="icon" href="../images/Okami_Designs_HeadWhite.png?v=20260615" type="image/png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html.signal-lab-output-root,
        html.signal-lab-output-root body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        .output-stage {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            position: relative;
        }
        .output-canvas-wrap {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        .output-canvas-wrap canvas {
            display: block;
            flex-shrink: 0;
        }
        .output-fullscreen-prompt {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.72);
            color: #fff;
            font: 700 clamp(16px, 3vw, 24px) Montserrat, sans-serif;
            text-align: center;
            padding: 24px;
            cursor: pointer;
            z-index: 2;
        }
        .output-fullscreen-prompt.is-visible {
            display: flex;
        }
        .output-waiting {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: #000;
            color: rgba(255, 255, 255, 0.65);
            font: 600 clamp(14px, 2.5vw, 20px) Montserrat, sans-serif;
            text-align: center;
            padding: 24px;
            z-index: 3;
        }
        .output-waiting.is-visible {
            display: flex;
        }
    </style>
</head>
<body>
    <div class="output-stage" id="output-stage">
        <div class="output-canvas-wrap" id="output-canvas-wrap">
            <canvas id="output-canvas" aria-label="Signal Lab output"></canvas>
        </div>
        <div id="output-waiting" class="output-waiting is-visible">Waiting for Signal Lab output...</div>
        <div id="output-fullscreen-prompt" class="output-fullscreen-prompt">Click to enter fullscreen</div>
    </div>
    <script src="signal-lab/engine/control-utils.js?v=20260615"></script>
