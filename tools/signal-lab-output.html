<!DOCTYPE html>
<html lang="en" class="signal-lab-output-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okami Signal Lab — Output</title>
    <link rel="icon" href="../images/Okami_Designs_HeadWhite.png" type="image/png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html.signal-lab-output-root,
        html.signal-lab-output-root body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        .output-stage {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            position: relative;
        }
        .output-canvas-wrap {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        .output-canvas-wrap canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .output-hint {
            position: absolute;
            left: 50%;
            bottom: 14px;
            transform: translateX(-50%);
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.55);
            color: rgba(255, 255, 255, 0.55);
            font: 600 11px/1.4 Montserrat, sans-serif;
            letter-spacing: 0.03em;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .output-stage:hover .output-hint,
        .output-stage:focus-within .output-hint {
            opacity: 1;
        }
        .output-fullscreen-prompt {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.72);
            color: #fff;
            font: 700 clamp(16px, 3vw, 24px) Montserrat, sans-serif;
            text-align: center;
            padding: 24px;
            cursor: pointer;
            z-index: 2;
        }
        .output-fullscreen-prompt.is-visible {
            display: flex;
        }
        .output-waiting {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: #000;
            color: rgba(255, 255, 255, 0.65);
            font: 600 clamp(14px, 2.5vw, 20px) Montserrat, sans-serif;
            text-align: center;
            padding: 24px;
            z-index: 3;
        }
        .output-waiting.is-visible {
            display: flex;
        }
    </style>
</head>
<body>
    <div class="output-stage" id="output-stage">
        <div class="output-canvas-wrap" id="output-canvas-wrap">
            <canvas id="output-canvas" aria-label="Signal Lab output"></canvas>
        </div>
        <div id="output-waiting" class="output-waiting is-visible">Waiting for Signal Lab output state...</div>
        <div id="output-fullscreen-prompt" class="output-fullscreen-prompt">Click to enter fullscreen</div>
        <div class="output-hint">Double-click to close</div>
    </div>
    <script src="signal-lab/engine/control-utils.js"></script>
    <script src="signal-lab/engine/pattern-resolution.js"></script>
    <script src="signal-lab/engine/output-state.js"></script>
    <script src="signal-lab/engine/signal-lab-renderer.js"></script>
    <script src="signal-lab/engine/overlay-renderer.js"></script>
    <script src="signal-lab/engine/display-metrics.js"></script>
    <script src="signal-lab/engine/sync-audio.js"></script>
    <script src="signal-lab/engine/audio-engine.js"></script>
    <script src="signal-lab/engine/led-wall-calculator.js"></script>
    <script src="signal-lab/engine/pattern-exporter.js"></script>
    <script src="signal-lab/engine/render-engine.js"></script>
    <script src="signal-lab/engine/okami-calibration-pattern.js"></script>
    <script src="signal-lab/modules/registry.js"></script>
    <script src="signal-lab/modules/welcome-pattern.js"></script>
    <script src="signal-lab/modules/video-patterns.js"></script>
    <script src="signal-lab/modules/motion-patterns.js"></script>
    <script src="signal-lab/modules/audio-generator.js"></script>
    <script src="signal-lab/modules/av-sync-tools.js"></script>
    <script src="signal-lab/modules/display-info.js"></script>
    <script src="signal-lab/modules/branding-overlay.js"></script>
    <script src="signal-lab/modules/pattern-export.js"></script>
    <script src="signal-lab/modules/led-wall-utilities.js"></script>
    <script src="signal-lab-output.js"></script>
</body>
</html>
